artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "This is a small deterministic parsing task: read an access log, count total requests and unique clients, and identify the most requested path."
solution_explanation = "The solution reads /app/access.log, extracts the client IP from each non-empty line, extracts request paths from quoted HTTP request strings, counts paths, and writes the requested JSON report."
verification_explanation = "The verifier reads /app/report.json, checks that it is valid JSON with exactly the expected keys, and asserts the expected total request count, unique IP count, and top path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
